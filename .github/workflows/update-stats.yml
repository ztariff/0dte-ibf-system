name: Update Strategy Stats

on:
  push:
    paths:
      - 'research_all_trades.csv'   # Regenerate whenever trade CSV changes
  schedule:
    - cron: '0 22 * * 1-5'         # 10 PM UTC = 5 PM ET, Mon–Fri
  workflow_dispatch:                # Allow manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  update-stats:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pandas numpy

      - name: Run compute_stats.py
        run: python compute_stats.py

      - name: Commit updated stats (if changed)
        run: |
          git config user.name  'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add strategy_stats.json strategy_trades.json
          if git diff --staged --quiet; then
            echo "No changes — stats already up to date"
          else
            git commit -m "auto: update strategy stats $(date -u +%Y-%m-%d)"
            git push
          fi
